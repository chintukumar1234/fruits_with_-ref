<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapTrack — Live Delivery Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e14;
  --surface: #111820;
  --surface2: #161e28;
  --border: rgba(255,255,255,0.07);
  --accent: #00d4ff;
  --accent2: #00ff88;
  --danger: #ff4d6d;
  --text: #e8edf2;
  --muted: #5a6878;
  --sidebar-w: 320px;
  --ease: cubic-bezier(0.4,0,0.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

/* ── MAP ── */
#map {
  height: 100vh;
  width: 100%;
  transition: margin-left 0.45s var(--ease);
}
.leaflet-routing-container { display: none !important; }

/* ── SIDEBAR ── */
.sidenav {
  height: 100vh;
  width: 0;
  position: fixed;
  z-index: 1000;
  top: 0; left: 0;
  background: var(--surface);
  overflow: hidden;
  transition: width 0.45s var(--ease);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.sidenav.open { width: var(--sidebar-w); }

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: var(--sidebar-w);
}
.sidebar-logo {
  font-family: 'Space Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
  white-space: nowrap;
}
.sidebar-logo span { color: var(--accent2); }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent2);
  box-shadow: 0 0 8px var(--accent2);
  animation: pulse-dot 2s infinite;
  margin-left: auto; flex-shrink: 0;
}
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.5; transform:scale(0.8); }
}

.sidebar-actions {
  display: flex;
  gap: 8px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  min-width: var(--sidebar-w);
}
.action-btn {
  flex: 1;
  height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center; gap:6px;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  white-space: nowrap;
}
.action-btn:hover { border-color: var(--accent); background: rgba(0,212,255,0.06); transform: translateY(-1px); }
.action-btn.danger:hover { border-color: var(--danger); background: rgba(255,77,109,0.06); }
.action-btn svg { flex-shrink:0; }

.sidebar-list-label {
  padding: 14px 18px 8px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
  min-width: var(--sidebar-w);
}
#display_items {
  flex: 1;
  overflow-y: auto;
  padding: 6px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: var(--sidebar-w);
}
#display_items::-webkit-scrollbar { width: 4px; }
#display_items::-webkit-scrollbar-track { background: transparent; }
#display_items::-webkit-scrollbar-thumb { background: var(--border); border-radius:4px; }

.delivery-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.2s, transform 0.2s;
}
.delivery-card:hover { border-color: rgba(0,212,255,0.3); transform: translateX(3px); }
.delivery-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(0,212,255,0.08);
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0;
}
.delivery-name {
  font-size: 14px; font-weight: 500; color: var(--text);
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-actions { display:flex; gap:6px; flex-shrink:0; }
.icon-btn {
  width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
  background: none; cursor: pointer; display:flex; align-items:center; justify-content:center;
  transition: 0.2s; color: var(--muted);
}
.icon-btn.route-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(0,255,136,0.06); }
.icon-btn.del-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(255,77,109,0.06); }

/* ── TOAST NOTIFICATION ── */
#toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 20px;
  border-radius: 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
  white-space: nowrap;
  max-width: 90vw;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
#toast.success { border-color: rgba(0,255,136,0.3); }
#toast.success .toast-icon { color: var(--accent2); }
#toast.error { border-color: rgba(255,77,109,0.3); }
#toast.error .toast-icon { color: var(--danger); }
#toast.info { border-color: rgba(0,212,255,0.3); }
#toast.info .toast-icon { color: var(--accent); }
.toast-icon { flex-shrink: 0; }

/* ── CONFIRM DIALOG ── */
.confirm-overlay {
  position: fixed; inset: 0; z-index: 3000;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  width: 320px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  animation: modal-in 0.25s var(--ease);
  text-align: center;
}
.confirm-icon {
  width: 52px; height: 52px; border-radius: 16px;
  background: rgba(255,77,109,0.1);
  border: 1px solid rgba(255,77,109,0.25);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  color: var(--danger);
}
.confirm-title {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--danger);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.confirm-text {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 24px;
  line-height: 1.5;
}
.confirm-name {
  color: var(--text);
  font-weight: 600;
}
.confirm-btns {
  display: flex;
  gap: 10px;
}
.confirm-btn {
  flex: 1; height: 42px; border-radius: 11px; border: 1px solid var(--border);
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: 0.2s;
}
.confirm-btn.cancel {
  background: var(--surface2);
  color: var(--text);
}
.confirm-btn.cancel:hover { border-color: var(--muted); }
.confirm-btn.confirm-delete {
  background: linear-gradient(135deg, var(--danger), #cc2244);
  color: #fff;
  border-color: transparent;
}
.confirm-btn.confirm-delete:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,77,109,0.35); }

/* ── MODAL OVERLAY ── */
.modal-overlay {
  position: fixed; inset:0; z-index: 2000;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  display: none; align-items:center; justify-content:center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  width: 340px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  animation: modal-in 0.25s var(--ease);
}
@keyframes modal-in {
  from { opacity:0; transform: translateY(16px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}
.modal-title {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 20px;
  display: flex; align-items:center; justify-content:space-between;
}
.modal-close {
  width:28px; height:28px; border-radius:8px; border:1px solid var(--border);
  background: none; color: var(--muted); cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center;
  transition: 0.2s;
}
.modal-close:hover { border-color:var(--danger); color:var(--danger); }
.modal-fields { display:flex; flex-direction:column; gap:12px; }
.field-group { display:flex; flex-direction:column; gap:5px; }
.field-label { font-size:11px; font-weight:600; letter-spacing:0.8px; color:var(--muted); text-transform:uppercase; }
.field-input {
  height: 42px; border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  padding: 0 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field-input[type="file"] { padding: 8px 14px; height:auto; cursor:pointer; }
.field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
.modal-msg { font-size:12px; color:var(--danger); min-height:18px; margin-top:4px; }
.modal-submit {
  width: 100%; height: 44px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--accent), #0099cc);
  color: #000; font-family:'Outfit',sans-serif; font-size:14px; font-weight:600;
  cursor: pointer; margin-top:6px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.modal-submit:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(0,212,255,0.35); }
.modal-submit.danger-submit {
  background: linear-gradient(135deg, var(--danger), #cc2244);
  color: #fff;
}
.modal-submit.danger-submit:hover { box-shadow:0 10px 28px rgba(255,77,109,0.35); }

/* ── MENU BUTTON ── */
.menu-btn {
  position: fixed;
  top: 18px; left: 18px;
  z-index: 1100;
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.menu-btn:hover { border-color: var(--accent); box-shadow: 0 4px 20px rgba(0,212,255,0.15); }
.bar { width:18px; height:2px; background:var(--text); border-radius:2px; transition:0.35s var(--ease); }
.menu-btn.open .bar:nth-child(1) { transform: rotate(45deg) translate(4px,5px); }
.menu-btn.open .bar:nth-child(2) { opacity:0; transform:scaleX(0); }
.menu-btn.open .bar:nth-child(3) { transform: rotate(-45deg) translate(4px,-5px); }

/* ── MAP CUSTOM ── */
.leaflet-container { background: #0d1117 !important; }

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 85%; }
  body { overflow: auto; }
  .sidenav { width: 0; }
  .sidenav.open { width: var(--sidebar-w); }
  #map { margin-left: 0 !important; }
  .action-btn { height: 44px; font-size: 14px; }
  .icon-btn { width: 36px; height: 36px; }
  .modal { width: 90%; padding: 20px; }
  .confirm-box { width: 90%; }
  .menu-btn { top: 12px; left: 12px; width: 42px; height: 42px; }
  .delivery-card { padding: 14px; }
  .delivery-name { font-size: 15px; }
  #toast { bottom: 20px; font-size: 13px; }
}
</style>
</head>
<body>

<!-- Toast Notification -->
<div id="toast">
  <span class="toast-icon" id="toastIcon"></span>
  <span id="toastMsg"></span>
</div>

<!-- Confirm Delete Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
      </svg>
    </div>
    <div class="confirm-title">Delete Point</div>
    <div class="confirm-text">Are you sure you want to remove <span class="confirm-name" id="confirmName">"this item"</span> from the map?<br>This action cannot be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-btn cancel" id="confirmCancelBtn">Cancel</button>
      <button class="confirm-btn confirm-delete" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<!-- Menu toggle -->
<button class="menu-btn" id="menuBtn" onclick="openNav()">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</button>

<!-- Sidebar -->
<div id="mySidenav" class="sidenav">
  <div class="sidebar-header">
    <div class="sidebar-logo">MAP<span>TRACK</span></div>
    <div class="status-dot"></div>
  </div>
  <div class="sidebar-actions">
    <button class="action-btn" onclick="showUpload()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Add Item
    </button>
    <button class="action-btn danger" onclick="showDelete()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      Delete
    </button>
  </div>
  <div class="sidebar-list-label">Delivery Points</div>
  <div id="display_items"></div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Upload Modal -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <div class="modal-title">
      ADD ITEM
      <button class="modal-close" onclick="closeModal('uploadModal')">✕</button>
    </div>
    <div class="modal-fields">
      <div class="field-group">
        <div class="field-label">Image</div>
        <input type="file" id="images" class="field-input" accept="image/*"/>
      </div>
      <div class="field-group">
        <div class="field-label">Item Name</div>
        <input type="text" id="names" class="field-input" placeholder="e.g. Package #001"/>
      </div>
      <div class="field-group">
        <div class="field-label">Amount</div>
        <input type="number" id="numbers" class="field-input" placeholder="e.g. 250"/>
      </div>
      <div class="modal-msg" id="upload_msg"></div>
      <button class="modal-submit" onclick="chintu()">Upload Item</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-title">
      DELETE ITEM
      <button class="modal-close" onclick="closeModal('deleteModal')">✕</button>
    </div>
    <div class="modal-fields">
      <div class="field-group">
        <div class="field-label">Item Name</div>
        <input type="text" id="nam" class="field-input" placeholder="Enter exact name"/>
      </div>
      <div class="field-group">
        <div class="field-label">Amount</div>
        <input type="number" id="amu" class="field-input" placeholder="Enter exact amount"/>
      </div>
      <div class="modal-msg" id="delete_msg"></div>
      <button class="modal-submit danger-submit" onclick="delete_btn()">Delete Item</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, push, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVWLIDjsmMcH2kfqiKwQ1-jFU6d6654pY",
  authDomain: "myproject-fdb4c.firebaseapp.com",
  databaseURL: "https://myproject-fdb4c-default-rtdb.firebaseio.com",
  projectId: "myproject-fdb4c",
  storageBucket: "myproject-fdb4c.firebasestorage.app",
  messagingSenderId: "600134367178",
  appId: "1:600134367178:web:ea8b0daa3928c7791c8133"
};

let userMarker = null, accuracyCircle = null;
let userLat = null, userLng = null;
let routingControl = null;

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ── Toast System ── */
let toastTimer = null;
window.showToast = function(message, type = 'info') {
  const toast = document.getElementById('toast');
  const msg = document.getElementById('toastMsg');
  const icon = document.getElementById('toastIcon');

  const icons = {
    success: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>`,
    error:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
    info:    `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
  };

  toast.className = '';
  toast.classList.add(type);
  msg.textContent = message;
  icon.innerHTML = icons[type] || icons.info;

  if (toastTimer) clearTimeout(toastTimer);
  // Force reflow to restart animation
  void toast.offsetWidth;
  toast.classList.add('show');

  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
};

/* ── Confirm Dialog ── */
window.showConfirm = function(itemName, onConfirm) {
  const overlay = document.getElementById('confirmOverlay');
  document.getElementById('confirmName').textContent = `"${itemName}"`;
  overlay.classList.add('open');

  const deleteBtn = document.getElementById('confirmDeleteBtn');
  const cancelBtn = document.getElementById('confirmCancelBtn');

  // Clone to remove old listeners
  const newDeleteBtn = deleteBtn.cloneNode(true);
  const newCancelBtn = cancelBtn.cloneNode(true);
  deleteBtn.parentNode.replaceChild(newDeleteBtn, deleteBtn);
  cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);

  newDeleteBtn.addEventListener('click', () => {
    overlay.classList.remove('open');
    onConfirm();
  });
  newCancelBtn.addEventListener('click', () => {
    overlay.classList.remove('open');
    showToast('Delete cancelled', 'info');
  });
};

// Close confirm on backdrop
document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

/* ── Linked List ── */
class Node { constructor(d,id,lat,lng){this.data=d;this.id=id;this.lat=lat;this.lng=lng;this.link=null;} }
class LinkedList {
  constructor(){ this.head=null; }
  add(v,id,lat,lng){
    const n=new Node(v,id,lat,lng);
    if(!this.head){this.head=n;return;}
    let c=this.head; while(c.link)c=c.link; c.link=n;
  }
  del(id){
    if(!this.head)return;
    if(this.head.id===id){this.head=this.head.link;return;}
    let c=this.head;
    while(c.link&&c.link.id!==id)c=c.link;
    if(c.link)c.link=c.link.link;
  }
  findById(id) {
    let c = this.head;
    while (c) { if (c.id === id) return c; c = c.link; }
    return null;
  }
  render(){
    const el=document.getElementById("display_items");
    el.innerHTML="";
    let c=this.head;
    if (!c) {
      el.innerHTML = `<div style="text-align:center;padding:32px 16px;color:var(--muted);font-size:13px;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.3;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        No delivery points yet
      </div>`;
      return;
    }
    while(c){
      const card=document.createElement("div");
      card.className="delivery-card";
      card.innerHTML=`
        <div class="delivery-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div class="delivery-name" title="${c.data}">${c.data}</div>
        <div class="card-actions">
          <button class="icon-btn route-btn" title="Show Route" onclick="window.route(${c.lat},${c.lng})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 8 14 12"/><path d="M2 12h16"/><path d="M2 6h4a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2"/></svg>
          </button>
          <button class="icon-btn del-btn" title="Delete" onclick="window.k('${c.id}','${c.data.replace(/'/g,"\\'")}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div>`;
      el.appendChild(card);
      c=c.link;
    }
  }
}
const list = new LinkedList();

/* ── Map ── */
const map = L.map('map',{zoomControl:false}).setView([20,0],2);

const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'© OpenStreetMap'
});
const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
  maxZoom:19, attribution:'Tiles © Esri'
});
streetLayer.addTo(map);
L.control.layers({"Street":streetLayer,"Satellite":satelliteLayer},{},{position:'bottomright'}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

/* ── Markers ── */
const pinIcon = L.icon({
  iconUrl:'https://cdn-icons-png.flaticon.com/128/9131/9131546.png',
  iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-32]
});

function addMarker(name,lat,lng){
  L.marker([lat,lng],{icon:pinIcon}).addTo(map).bindPopup(`<b>${name}</b>`);
}

/* ── Geolocation ── */
if(navigator.geolocation){
  navigator.geolocation.watchPosition(pos=>{
    userLat=pos.coords.latitude; userLng=pos.coords.longitude;
    if(!userMarker){
      userMarker=L.marker([userLat,userLng]).addTo(map).bindPopup("You are here");
      accuracyCircle=L.circle([userLat,userLng],{radius:pos.coords.accuracy,color:'#00d4ff',fillOpacity:0.1}).addTo(map);
      map.setView([userLat,userLng],16);
    } else {
      userMarker.setLatLng([userLat,userLng]);
      accuracyCircle.setLatLng([userLat,userLng]);
      accuracyCircle.setRadius(pos.coords.accuracy);
    }
  },err=>console.error(err),{enableHighAccuracy:true,maximumAge:0,timeout:5000});
}

/* ── Firebase sync ── */
onValue(ref(db,"submit"),snapshot=>{
  list.head=null;
  snapshot.forEach(child=>{
    const d=child.val();
    addMarker(d.a,d.c1,d.c2);
    list.add(d.a,child.key,d.c1,d.c2);
  });
  list.render();
});

/* ── Delete from card (by Firebase ID) ── */
window.k = function(id, name) {
  showConfirm(name, () => {
    remove(ref(db, "submit/" + id))
      .then(() => {
        list.del(id);
        list.render();
        showToast(`"${name}" deleted successfully`, 'success');
      })
      .catch(err => {
        console.error(err);
        showToast('Failed to delete. Try again.', 'error');
      });
  });
};

window.route=function(tLat,tLng){
  if(!userLat||!userLng){ showToast("Location not ready yet!", 'error'); return; }
  if(routingControl) map.removeControl(routingControl);
  routingControl=L.Routing.control({
    waypoints:[L.latLng(userLat,userLng),L.latLng(tLat,tLng)],
    router:L.Routing.osrmv1({serviceUrl:'https://router.project-osrm.org/route/v1',profile:'driving'}),
    routeWhileDragging:false, addWaypoints:false, draggableWaypoints:false,
    createMarker:()=>null, show:false,
    lineOptions:{styles:[{color:'#00d4ff',opacity:0.9,weight:4}]}
  }).addTo(map);
  map.fitBounds(L.latLngBounds([[userLat,userLng],[tLat,tLng]]),{padding:[60,60]});
  showToast('Route calculated!', 'success');
};

/* ── Upload ── */
class ItemNode{constructor(d){this.data=d;this.link=null;}}
class ItemList{
  constructor(){this.head=null;}
  add(v){const n=new ItemNode(v);n.link=this.head;this.head=n;}
}
const items=new ItemList();

window.chintu=function(){
  const file=document.getElementById("images").files[0];
  const name=document.getElementById("names").value.trim();
  const amt=document.getElementById("numbers").value.trim();
  const msg=document.getElementById("upload_msg");
  if(!file){msg.textContent="Please upload an image";return;}
  if(!name){msg.textContent="Please enter a name";return;}
  if(!amt){msg.textContent="Please enter an amount";return;}
  const reader=new FileReader();
  reader.onload=function(){
    const data={a:reader.result,b:name,c:amt};
    const r=push(ref(db,'user'));
    set(r,data)
      .then(()=>{
        document.getElementById("images").value="";
        document.getElementById("names").value="";
        document.getElementById("numbers").value="";
        msg.style.color="var(--accent2)";
        msg.textContent="Item uploaded!";
        setTimeout(()=>{ msg.textContent=""; closeModal('uploadModal'); }, 1200);
        showToast(`"${name}" uploaded successfully`, 'success');
      })
      .catch(e=>{
        console.error(e);
        showToast('Upload failed. Try again.', 'error');
      });
    items.add(data);
  };
  reader.readAsDataURL(file);
};

/* ── Delete by name + amount (from modal) ── */
window.delete_btn=function(){
  const nam=document.getElementById("nam").value.trim();
  const amu=document.getElementById("amu").value.trim();
  const msg=document.getElementById("delete_msg");
  if(!nam){msg.textContent="Please enter a name";return;}
  if(!amu){msg.textContent="Please enter an amount";return;}

  onValue(ref(db,"user"),snapshot=>{
    let found=false;
    let foundKey=null;

    snapshot.forEach(child=>{
      const d=child.val();
      if(d.b===nam && String(d.c)===String(amu)){
        found=true;
        foundKey=child.key;
      }
    });

    if(!found){
      msg.style.color="var(--danger)";
      msg.textContent="❌ Item not found. Check name & amount.";
      showToast('Item not found', 'error');
      return;
    }

    // Show confirm dialog before deleting
    closeModal('deleteModal');
    showConfirm(nam, () => {
      remove(ref(db,"user/"+foundKey))
        .then(()=>{
          document.getElementById("nam").value="";
          document.getElementById("amu").value="";
          msg.style.color="var(--accent2)";
          msg.textContent="Deleted successfully";
          showToast(`"${nam}" deleted successfully`, 'success');
        })
        .catch(err=>{
          console.error(err);
          showToast('Delete failed. Try again.', 'error');
        });
    });
  },{onlyOnce:true});
};

/* ── UI helpers ── */
window.openNav=function(){
  const nav=document.getElementById("mySidenav");
  const btn=document.getElementById("menuBtn");
  const isOpen=nav.classList.contains("open");
  nav.classList.toggle("open");
  btn.classList.toggle("open");
  // Only shift map on desktop
  if(window.innerWidth > 768) {
    document.getElementById("map").style.marginLeft=isOpen?"0":"var(--sidebar-w)";
  }
};

window.showUpload=function(){ document.getElementById("uploadModal").classList.add("open"); };
window.showDelete=function(){ document.getElementById("deleteModal").classList.add("open"); };
window.closeModal=function(id){ document.getElementById(id).classList.remove("open"); };

// Close modal on backdrop click
document.querySelectorAll(".modal-overlay").forEach(el=>{
  el.addEventListener("click",e=>{if(e.target===el)el.classList.remove("open");});
});
</script>
</body>
