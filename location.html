<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapTrack Pro — Live Delivery Intelligence</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root {
  --bg:        #060910;
  --panel:     #0c1118;
  --card:      #111821;
  --card2:     #161f2b;
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.12);
  --cyan:      #00e5ff;
  --green:     #00ffaa;
  --amber:     #ffb800;
  --red:       #ff3d5a;
  --purple:    #a259ff;
  --text:      #dde6f0;
  --sub:       #6b7d91;
  --sidebar-w: 340px;
  --ease:      cubic-bezier(0.4,0,0.2,1);
  --radius:    14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}

/* ── MAP ── */
#map{
  position:fixed;inset:0;
  transition:left 0.45s var(--ease);
}
.leaflet-container{background:#07090e !important;}
.leaflet-routing-container{display:none !important;}
.leaflet-control-zoom{display:none;}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;height:100%;width:0;
  background:var(--panel);
  border-right:1px solid var(--border2);
  display:flex;flex-direction:column;
  transition:width 0.45s var(--ease);
  z-index:900;overflow:hidden;
  backdrop-filter:blur(20px);
  box-shadow:4px 0 40px rgba(0,0,0,0.6);
}
.sidebar.open{width:var(--sidebar-w);}
.sidebar-inner{min-width:var(--sidebar-w);display:flex;flex-direction:column;height:100%;}

/* ── HEADER ── */
.sb-head{
  padding:22px 20px 18px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,rgba(0,229,255,0.03),transparent);
}
.logo{
  font-family:'JetBrains Mono', monospace;
  font-size:16px;
  font-weight:700;
  letter-spacing:2px;

  background: linear-gradient(90deg, var(--cyan), var(--green));

  background-clip: text;
  -webkit-background-clip: text;

  color: transparent;
  -webkit-text-fill-color: transparent;
}
.logo sup{font-size:9px;letter-spacing:1px;color:var(--amber);-webkit-text-fill-color:var(--amber);}
.live-badge{
  margin-left:auto;display:flex;align-items:center;gap:6px;
  background:rgba(0,255,170,0.08);border:1px solid rgba(0,255,170,0.2);
  border-radius:20px;padding:4px 10px;font-size:11px;color:var(--green);
  font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* ── STATS STRIP ── */
.stats-strip{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  padding:12px 14px;gap:8px;border-bottom:1px solid var(--border);
}
.stat-pill{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px 10px 8px;display:flex;flex-direction:column;gap:3px;align-items:center;
  transition:border-color 0.2s;
}
.stat-pill:hover{border-color:var(--cyan);}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--cyan);}
.stat-val.green{color:var(--green);}
.stat-val.amber{color:var(--amber);}
.stat-lbl{font-size:10px;color:var(--sub);letter-spacing:0.8px;text-transform:uppercase;}

/* ── ACTIONS ── */
.sb-actions{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);}
.act-btn{
  flex:1;height:40px;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;letter-spacing:0.3px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all 0.2s;white-space:nowrap;
}
.act-btn:hover{background:var(--card2);transform:translateY(-1px);}
.act-btn.a-cyan:hover{border-color:var(--cyan);color:var(--cyan);}
.act-btn.a-red:hover{border-color:var(--red);color:var(--red);}
.act-btn.a-green:hover{border-color:var(--green);color:var(--green);}
.act-btn.a-amber:hover{border-color:var(--amber);color:var(--amber);}

/* ── FILTER TABS ── */
.filter-tabs{display:flex;gap:6px;padding:10px 14px 6px;border-bottom:1px solid var(--border);}
.ftab{
  font-size:11px;font-weight:600;letter-spacing:0.5px;padding:5px 12px;border-radius:20px;
  border:1px solid var(--border);background:none;color:var(--sub);cursor:pointer;transition:0.2s;
}
.ftab.active{background:rgba(0,229,255,0.1);border-color:var(--cyan);color:var(--cyan);}
.ftab:hover:not(.active){border-color:var(--border2);color:var(--text);}

/* ── LIST HEADER ── */
.list-head{
  padding:12px 18px 6px;
  display:flex;align-items:center;justify-content:space-between;
}
.list-title{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--sub);text-transform:uppercase;}
.list-count{
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);
  background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.15);
  border-radius:20px;padding:2px 8px;
}

/* ── DELIVERY CARDS ── */
#display_items{
  flex:1;overflow-y:auto;padding:8px 12px 20px;display:flex;flex-direction:column;gap:8px;
}
#display_items::-webkit-scrollbar{width:3px;}
#display_items::-webkit-scrollbar-track{background:transparent;}
#display_items::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}

.d-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;transition:all 0.25s;
  animation:card-in 0.35s var(--ease) both;
}
@keyframes card-in{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}
.d-card:hover{border-color:rgba(0,229,255,0.3);background:var(--card2);transform:translateX(4px);}
.d-card.active{border-color:var(--cyan);background:rgba(0,229,255,0.05);}

.d-card-top{display:flex;align-items:center;gap:10px;padding:12px 12px 10px;}
.d-num{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(0,229,255,0.15),rgba(0,229,255,0.05));
  border:1px solid rgba(0,229,255,0.2);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--cyan);
}
.d-info{flex:1;min-width:0;}
.d-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.d-sub{font-size:11px;color:var(--sub);margin-top:2px;}
.d-status{
  display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;
  letter-spacing:0.5px;padding:3px 8px;border-radius:20px;
}
.d-status.pending{background:rgba(255,184,0,0.1);color:var(--amber);border:1px solid rgba(255,184,0,0.2);}
.d-status.transit{background:rgba(0,229,255,0.1);color:var(--cyan);border:1px solid rgba(0,229,255,0.2);}
.d-status.done{background:rgba(0,255,170,0.1);color:var(--green);border:1px solid rgba(0,255,170,0.2);}

.d-card-bottom{
  border-top:1px solid var(--border);padding:8px 12px;
  display:flex;align-items:center;gap:8px;
}
.d-coords{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.d-actions{display:flex;gap:5px;flex-shrink:0;}
.d-btn{
  width:28px;height:28px;border-radius:7px;border:1px solid var(--border);
  background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;color:var(--sub);
}
.d-btn.route:hover{border-color:var(--green);color:var(--green);background:rgba(0,255,170,0.08);}
.d-btn.focus:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,0.08);}
.d-btn.del:hover{border-color:var(--red);color:var(--red);background:rgba(255,61,90,0.08);}
.d-btn svg{pointer-events:none;}

/* ── HAMBURGER ── */
.menu-btn{
  position:fixed;top:16px;left:16px;z-index:1000;
  width:44px;height:44px;border-radius:12px;
  background:rgba(12,17,24,0.95);backdrop-filter:blur(16px);
  border:1px solid var(--border2);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  transition:all 0.2s;box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
.menu-btn:hover{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,229,255,0.15);}
.bar{width:18px;height:2px;background:var(--text);border-radius:2px;transition:0.3s var(--ease);}
.menu-btn.open .bar:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.menu-btn.open .bar:nth-child(2){opacity:0;transform:scaleX(0);}
.menu-btn.open .bar:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

/* ── MAP HUD PANEL ── */
.map-hud{
top:24px;
right:94px;
z-index:1500;
align-items: center;
gap:12px;
width: 98%;
}
.hud-card{
  background:var(--panel);border:1px solid var(--border2);border-radius:12px;
  padding:10px 14px;display:flex;flex-direction:column;gap:6px;
  box-shadow:0 16px 40px rgba(0,0,0,0.6);
}
/* ── MODALS ── */
.overlay{
  position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;
}
.overlay.open{display:flex;}
.modal{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:20px;padding:26px;width:360px;
  box-shadow:0 40px 100px rgba(0,0,0,0.7);
  animation:min-in 0.3s var(--ease);
}
@keyframes min-in{from{opacity:0;transform:translateY(20px) scale(0.96);}to{opacity:1;transform:none;}}
.m-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.m-title{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1.5px;color:var(--cyan);}
.m-close{
  width:28px;height:28px;border-radius:8px;border:1px solid var(--border);
  background:none;color:var(--sub);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:0.2s;
}
.m-close:hover{border-color:var(--red);color:var(--red);}
.m-fields{display:flex;flex-direction:column;gap:12px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.flbl{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--sub);text-transform:uppercase;}
.finp{
  height:42px;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text);padding:0 14px;
  font-family:'DM Sans',sans-serif;font-size:14px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.finp[type=file]{padding:9px 14px;height:auto;cursor:pointer;}
.finp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,0.08);}
.m-msg{font-size:12px;color:var(--red);min-height:18px;margin-top:2px;}
.m-submit{
  width:100%;height:44px;border-radius:12px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
  background:linear-gradient(135deg,var(--cyan),#0099bb);color:#000;
  transition:transform 0.2s,box-shadow 0.2s;margin-top:4px;
  letter-spacing:0.3px;
}
.m-submit:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,229,255,0.3);}
.m-submit.danger{background:linear-gradient(135deg,var(--red),#bb1133);color:#fff;}
.m-submit.danger:hover{box-shadow:0 12px 32px rgba(255,61,90,0.3);}

/* ── CONFIRM ── */
.confirm-box{
  position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;
}
.confirm-inner{
  background:var(--panel);border:1px solid var(--border2);border-radius:18px;
  padding:28px;width:300px;text-align:center;
  box-shadow:0 40px 100px rgba(0,0,0,0.7);animation:min-in 0.25s var(--ease);
}
.confirm-icon{font-size:32px;margin-bottom:12px;}
.confirm-title{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--red);letter-spacing:1px;margin-bottom:8px;}
.confirm-sub{font-size:13px;color:var(--sub);margin-bottom:22px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btns button{flex:1;height:40px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:0.2s;}
#yesBtn{background:var(--red);color:#fff;}
#yesBtn:hover{background:#ff1a3d;}
#noBtn{background:var(--card2);color:var(--text);border:1px solid var(--border2);}
#noBtn:hover{border-color:var(--border2);}

/* ── PAYMENT ── */
.pay-modal{
  background:var(--panel);border:1px solid var(--border2);border-radius:20px;
  padding:26px;width:300px;box-shadow:0 40px 100px rgba(0,0,0,0.7);
  animation:min-in 0.3s var(--ease);display:flex;flex-direction:column;gap:16px;align-items:center;
}
.qr-btn{
  width:100%;height:44px;border-radius:12px;
  border:1px solid rgba(0,255,170,0.3);background:rgba(0,255,170,0.06);
  color:var(--green);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:0.2s;letter-spacing:0.3px;
}
.qr-btn:hover{background:rgba(0,255,170,0.12);transform:translateY(-1px);}
#qrWrapper{display:none;flex-direction:column;align-items:center;gap:10px;}
#qrWrapper.visible{display:flex;}
#payQrCanvas{background:#fff;border-radius:12px;padding:10px;}
.qr-lbl{font-size:10px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;}

/* ── CUSTOM MAP MARKER ── */
.custom-pin{
  width:40px;height:40px;position:relative;cursor:pointer;
}
.pin-pulse{
  position:absolute;inset:-8px;border-radius:50%;
  background:rgba(0,229,255,0.15);animation:ping 2s ease-out infinite;
}
@keyframes ping{0%{transform:scale(0.8);opacity:1;}100%{transform:scale(1.8);opacity:0;}}
.pin-body{
  position:absolute;inset:0;
  background:linear-gradient(135deg,var(--cyan),#0077aa);
  border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  box-shadow:0 4px 20px rgba(0,229,255,0.5);
}
.pin-inner{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);
  width:14px;height:14px;background:#060910;border-radius:50%;
}
.pin-num{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--cyan);
}

/* ── ROUTE BADGE ── */
.route-info{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(12,17,24,0.95);backdrop-filter:blur(16px);
  border:1px solid var(--cyan);border-radius:100px;
  padding:10px 20px;display:none;align-items:center;gap:16px;z-index:800;
  box-shadow:0 8px 32px rgba(0,229,255,0.2);animation:slide-up 0.3s var(--ease);
}
.route-info.visible{display:flex;}
@keyframes slide-up{from{opacity:0;transform:translateX(-50%) translateY(16px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.ri-stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
.ri-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--cyan);}
.ri-lbl{font-size:10px;color:var(--sub);letter-spacing:0.8px;text-transform:uppercase;}
.ri-div{width:1px;height:30px;background:var(--border2);}
.ri-close{
  width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);
  background:none;color:var(--sub);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:0.2s;
}
.ri-close:hover{border-color:var(--red);color:var(--red);}

/* ── EMPTY STATE ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;gap:12px;opacity:0.4;
}
.empty-state svg{color:var(--sub);}
.empty-state p{font-size:13px;color:var(--sub);text-align:center;line-height:1.5;}

/* ── SEARCH ── */
.sb-search{padding:10px 14px 4px;}
.search-wrap{position:relative;}
.search-wrap input{
  width:100%;height:36px;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text);padding:0 12px 0 34px;
  font-family:'DM Sans',sans-serif;font-size:13px;outline:none;
  transition:border-color 0.2s;
}
.search-wrap input:focus{border-color:var(--cyan);}
.search-wrap input::placeholder{color:var(--sub);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--sub);pointer-events:none;}

/* ── TOOLTIP ── */
.leaflet-popup-content-wrapper{
  background:var(--panel) !important;border:1px solid var(--border2) !important;
  border-radius:12px !important;box-shadow:0 16px 40px rgba(0,0,0,0.6) !important;
  padding:0 !important;
}
.leaflet-popup-content{
  margin:0 !important;padding:14px 16px !important;
  font-family:'DM Sans',sans-serif;color:var(--text);
}
.leaflet-popup-tip{background:var(--panel) !important;}

@media(max-width:768px){
  :root{--sidebar-w:88%;}
  #map{left:0 !important;}
  .map-hud{right:8px;top:70px;}
  .hud-card{min-width:120px;padding:8px 10px;}
  .modal{width:90%;padding:20px;}
  .pay-modal{width:88%;}
}
</style>
</head>
<body>

<!-- HAMBURGER -->
<button class="menu-btn" id="menuBtn" onclick="openNav()">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div>
</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-inner">

    <!-- Header -->
    <div class="sb-head">
      <div class="logo">MAPTRACK <sup>PRO</sup></div>
      <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    </div>

    <!-- Stats -->
    <div class="stats-strip">
      <div class="stat-pill">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-lbl">Total</div>
      </div>
      <div class="stat-pill">
        <div class="stat-val green" id="stat-done">0</div>
        <div class="stat-lbl">Done</div>
      </div>
      <div class="stat-pill">
        <div class="stat-val amber" id="stat-pending">0</div>
        <div class="stat-lbl">Pending</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="sb-actions">
      <button class="act-btn a-cyan" onclick="showUpload()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
      <button class="act-btn a-red" onclick="showDelete()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Delete
      </button>
      <button class="act-btn a-green" onclick="g()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
        Pay
      </button>
      <button class="act-btn a-amber" onclick="clearRoute()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Clear
      </button>
    </div>
    
    <!-- MAP HUD -->
<div class="map-hud">
  <div class="hud-card">

<!-- LEAFLET + FIREBASE -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, push, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVWLIDjsmMcH2kfqiKwQ1-jFU6d6654pY",
  authDomain: "myproject-fdb4c.firebaseapp.com",
  databaseURL: "https://myproject-fdb4c-default-rtdb.firebaseio.com",
  projectId: "myproject-fdb4c",
  storageBucket: "myproject-fdb4c.firebasestorage.app",
  messagingSenderId: "600134367178",
  appId: "1:600134367178:web:ea8b0daa3928c7791c8133"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

/* ── STATE ── */
let userLat=null, userLng=null, userMarker=null, accCircle=null;
let routingControl=null, activeCardId=null;
let qrGenerated=false, qrVisible=false;
let currentFilter='all', currentSearch='';
let markers={};
let deliveryPoints=[];

/* ── MAP INIT ── */
const map = L.map('map',{zoomControl:false,attributionControl:false}).setView([20,78],5);

const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19});
const satLayer    = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19});
streetLayer.addTo(map);

/* Attribution mini */
L.control.attribution({position:'bottomleft',prefix:''}).addTo(map);
L.tileLayer('').addTo(map); // placeholder

/* ── LAYER SWITCH ── */
let activeLayer='street';
window.setLayer = function(l){
  if(l===activeLayer)return;
  if(l==='street'){satLayer.remove();streetLayer.addTo(map);}
  else{streetLayer.remove();satLayer.addTo(map);}
  activeLayer=l;
  document.getElementById('lb-street').style.borderColor = l==='street' ? 'var(--cyan)':'var(--border)';
  document.getElementById('lb-street').style.color       = l==='street' ? 'var(--cyan)':'var(--sub)';
  document.getElementById('lb-street').style.background  = l==='street' ? 'rgba(0,229,255,0.1)':'none';
  document.getElementById('lb-sat').style.borderColor    = l==='sat' ? 'var(--cyan)':'var(--border)';
  document.getElementById('lb-sat').style.color          = l==='sat' ? 'var(--cyan)':'var(--sub)';
  document.getElementById('lb-sat').style.background     = l==='sat' ? 'rgba(0,229,255,0.1)':'none';
};

/* ── CUSTOM MARKER FACTORY ── */
function makeIcon(num,active=false){
  const color = active ? 'var(--green)' : 'var(--cyan)';
  const shadow = active ? 'rgba(0,255,170,0.6)' : 'rgba(0,229,255,0.6)';
  const html=`
    <div style="width:40px;height:48px;position:relative;">
      <div style="position:absolute;inset:-8px;border-radius:50%;background:${active?'rgba(0,255,170,0.12)':'rgba(0,229,255,0.12)'};animation:ping 2s ease-out infinite;"></div>
      <div style="
        position:absolute;width:36px;height:36px;
        background:linear-gradient(135deg,${color},${active?'#006644':'#005588'});
        border-radius:50% 50% 50% 0;transform:rotate(-45deg);
        box-shadow:0 4px 20px ${shadow};border:2px solid rgba(255,255,255,0.15);
      "></div>
      <div style="
        position:absolute;top:7px;left:7px;width:22px;height:22px;
        background:#060910;border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:${color};
      ">${num}</div>
    </div>`;
  return L.divIcon({html,className:'',iconSize:[40,48],iconAnchor:[18,46],popupAnchor:[0,-46]});
}

function userIcon(){
  const html=`
    <div style="width:20px;height:20px;position:relative;">
      <div style="position:absolute;inset:-6px;border-radius:50%;background:rgba(255,184,0,0.15);animation:ping 2s ease-out infinite;"></div>
      <div style="width:20px;height:20px;border-radius:50%;background:var(--amber);border:3px solid #fff;box-shadow:0 0 0 3px rgba(255,184,0,0.3);"></div>
    </div>`;
  return L.divIcon({html,className:'',iconSize:[20,20],iconAnchor:[10,10],popupAnchor:[0,-15]});
}

/* ── LINKED LIST ── */
class Node{constructor(d,id,lat,lng){this.data=d;this.id=id;this.lat=lat;this.lng=lng;this.link=null;}}
class LinkedList{
  constructor(){this.head=null;this.size=0;}
  add(v,id,lat,lng){const n=new Node(v,id,lat,lng);if(!this.head){this.head=n;}else{let c=this.head;while(c.link)c=c.link;c.link=n;}this.size++;}
  del(id){if(!this.head)return;if(this.head.id===id){this.head=this.head.link;this.size--;return;}let c=this.head;while(c.link&&c.link.id!==id)c=c.link;if(c.link){c.link=c.link.link;this.size--;}}
  toArray(){const a=[];let c=this.head;while(c){a.push(c);c=c.link;}return a;}
}
const list=new LinkedList();

/* ── STATUS CYCLE (for demo variety) ── */
const STATUSES=['transit','transit','pending','done'];
let statusIdx=0;
function nextStatus(){return STATUSES[statusIdx++%STATUSES.length];}

/* ── RENDER ── */
function render(){
  const el=document.getElementById('display_items');
  const arr=list.toArray();
  deliveryPoints=arr;

  /* update stats */
  document.getElementById('stat-total').textContent=arr.length;
  const done=arr.filter(n=>n.status==='done').length;
  const pending=arr.filter(n=>n.status==='pending').length;
  document.getElementById('stat-done').textContent=done;
  document.getElementById('stat-pending').textContent=pending;

  /* filter + search */
  const search=currentSearch.toLowerCase();
  let filtered=arr.filter(n=>{
    const matchFilter=currentFilter==='all'||n.status===currentFilter;
    const matchSearch=!search||n.data.toLowerCase().includes(search);
    return matchFilter&&matchSearch;
  });

  document.getElementById('list-count').textContent=filtered.length;

  if(filtered.length===0){
    el.innerHTML=`<div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <p>No delivery points found.<br>Add one using the + button.</p>
    </div>`;
    return;
  }

  el.innerHTML='';
  filtered.forEach((node,i)=>{
    const statusMap={transit:{label:'IN TRANSIT',cls:'transit'},pending:{label:'PENDING',cls:'pending'},done:{label:'DELIVERED',cls:'done'}};
    const s=statusMap[node.status]||statusMap['pending'];
    const latS=node.lat?node.lat.toFixed(4):'—';
    const lngS=node.lng?node.lng.toFixed(4):'—';
    const isActive=node.id===activeCardId;

    const card=document.createElement('div');
    card.className='d-card'+(isActive?' active':'');
    card.style.animationDelay=(i*0.04)+'s';
    card.innerHTML=`
      <div class="d-card-top">
        <div class="d-num">${String(i+1).padStart(2,'0')}</div>
        <div class="d-info">
          <div class="d-name">${node.data}</div>
          <div class="d-sub">Point #${i+1} · Mapped</div>
        </div>
        <div class="d-status ${s.cls}">
          <span style="width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block;"></span>
          ${s.label}
        </div>
      </div>
      <div class="d-card-bottom">
        <div class="d-coords">${latS}, ${lngS}</div>
        <div class="d-actions">
          <button class="d-btn focus" title="Focus" onclick="window.focusPoint(${node.lat},${node.lng},'${node.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button class="d-btn route" title="Route" onclick="window.route(${node.lat},${node.lng},'${node.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 8 14 12"/><path d="M2 12h16"/></svg>
          </button>
          <button class="d-btn del" title="Delete" onclick="window.k('${node.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div>
      </div>`;
    el.appendChild(card);
  });
}

/* ── MARKER POPUP ── */
function popupHTML(name,lat,lng,idx){
  return `
    <div style="min-width:160px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan);letter-spacing:1px;margin-bottom:8px;">POINT #${idx}</div>
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;">${name}</div>
      <div style="font-size:11px;color:var(--sub);font-family:'JetBrains Mono',monospace;">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>
      <button onclick="window.route(${lat},${lng})" style="margin-top:10px;width:100%;height:32px;border-radius:8px;border:1px solid var(--cyan);background:rgba(0,229,255,0.08);color:var(--cyan);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">
        Navigate Here
      </button>
    </div>`;
}

/* ── FIREBASE SYNC ── */
let idx=0;
onValue(ref(db,'submit'),snapshot=>{
  /* clear old markers */
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  list.head=null;list.size=0;idx=0;

  snapshot.forEach(child=>{
    const d=child.val();
    idx++;
    const status=nextStatus();
    const key=child.key;
    list.add(d.a,key,d.c1,d.c2);
    /* set status on node */
    let c=list.head;while(c&&c.id!==key)c=c.link;
    if(c)c.status=status;

    /* add marker */
    const m=L.marker([d.c1,d.c2],{icon:makeIcon(idx,status==='done')}).addTo(map);
    m.bindPopup(popupHTML(d.a,d.c1,d.c2,idx),{className:'custom-popup',maxWidth:220});

    /* target area circle */
    L.circle([d.c1,d.c2],{
      radius:300,
      color:status==='done'?'#00ffaa':status==='transit'?'#00e5ff':'#ffb800',
      weight:1.5,
      opacity:0.7,
      fillOpacity:0.06,
      dashArray:'6 4'
    }).addTo(map);

    /* outer ring */
    L.circle([d.c1,d.c2],{
      radius:600,
      color:status==='done'?'#00ffaa':status==='transit'?'#00e5ff':'#ffb800',
      weight:0.6,
      opacity:0.25,
      fill:false,
      dashArray:'3 8'
    }).addTo(map);

    markers[key]=m;
  });

  render();
});

/* ── GEOLOCATION ── */
if(navigator.geolocation){
  navigator.geolocation.watchPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    const acc=pos.coords.accuracy;

    if(!userMarker){
      userMarker=L.marker([userLat,userLng],{icon:userIcon(),zIndexOffset:1000}).addTo(map)
        .bindPopup('<div style="font-size:13px;font-weight:600;"> You are here</div>');
      accCircle=L.circle([userLat,userLng],{
        radius:acc,color:var_amber(),fillOpacity:0.05,weight:1.5,dashArray:'4 4'
      }).addTo(map);
      map.setView([userLat,userLng],15);
    } else {
      userMarker.setLatLng([userLat,userLng]);
      accCircle.setLatLng([userLat,userLng]);
      accCircle.setRadius(acc);
    }
  },err=>console.error(err),{enableHighAccuracy:true,maximumAge:0,timeout:8000});
}
function var_amber(){return '#ffb800';}

/* ── ROUTE ── */
window.route=function(tLat,tLng,id){
  if(!userLat||!userLng){alert('Location not ready yet — please wait.');return;}
  if(routingControl)map.removeControl(routingControl);
  activeCardId=id||null;render();

  routingControl=L.Routing.control({
    waypoints:[L.latLng(userLat,userLng),L.latLng(tLat,tLng)],
    router:L.Routing.osrmv1({serviceUrl:'https://router.project-osrm.org/route/v1',profile:'driving'}),
    routeWhileDragging:false,addWaypoints:false,draggableWaypoints:false,createMarker:()=>null,show:false,
    lineOptions:{styles:[
      {color:'rgba(0,229,255,0.2)',weight:10},
      {color:'#00e5ff',weight:3,opacity:0.9,dashArray:'0'}
    ]}
  }).addTo(map);

  routingControl.on('routesfound',function(e){
    const r=e.routes[0];
    const dist=(r.summary.totalDistance/1000).toFixed(1)+'km';
    const mins=Math.round(r.summary.totalTime/60);
    const time=mins>=60?`${Math.floor(mins/60)}h ${mins%60}m`:`${mins}m`;
    document.getElementById('ri-dist').textContent=dist;
    document.getElementById('ri-time').textContent=time;
    document.getElementById('ri-pts').textContent='2';
    document.getElementById('routeInfo').classList.add('visible');
  });

  map.fitBounds(L.latLngBounds([[userLat,userLng],[tLat,tLng]]),{padding:[80,80]});
};

window.focusPoint=function(lat,lng,id){
  activeCardId=id;render();
  map.flyTo([lat,lng],17,{duration:1.2,easeLinearity:0.3});
  if(markers[id])markers[id].openPopup();
};

window.clearRoute=function(){
  if(routingControl){map.removeControl(routingControl);routingControl=null;}
  document.getElementById('routeInfo').classList.remove('visible');
  activeCardId=null;render();
};

/* ── DELETE ── */
window.k=function(id){
  const box=document.getElementById('confirmBox');
  box.style.display='flex';
  document.getElementById('yesBtn').onclick=function(){
    remove(ref(db,'submit/'+id));
    if(markers[id]){map.removeLayer(markers[id]);delete markers[id];}
    list.del(id);render();
    box.style.display='none';
  };
  document.getElementById('noBtn').onclick=function(){box.style.display='none';};
};

/* ── UPLOAD ── */
window.chintu=function(){
  const file=document.getElementById('images').files[0];
  const name=document.getElementById('names').value.trim();
  const amt=document.getElementById('numbers').value.trim();
  const msg=document.getElementById('upload_msg');
  if(!file){msg.textContent='Please upload an image';return;}
  if(!name){msg.textContent='Please enter a name';return;}
  if(!amt){msg.textContent='Please enter an amount';return;}
  const reader=new FileReader();
  reader.onload=function(){
    const data={a:reader.result,b:name,c:amt};
    const r=push(ref(db,'user'));
    set(r,data).then(()=>console.log('Saved')).catch(e=>console.error(e));
    document.getElementById('images').value='';
    document.getElementById('names').value='';
    document.getElementById('numbers').value='';
    msg.style.color='var(--green)';msg.textContent='✓ Delivery point added!';
    setTimeout(()=>{msg.textContent='';closeModal('uploadModal');},1400);
  };
  reader.readAsDataURL(file);
};

/* ── DELETE ITEM ── */
window.delete_btn=function(){
  const nam=document.getElementById('nam').value.trim();
  const amu=document.getElementById('amu').value.trim();
  const msg=document.getElementById('delete_msg');
  if(!nam){msg.textContent='Please enter a name';return;}
  if(!amu){msg.textContent='Please enter an amount';return;}
  onValue(ref(db,'user'),snapshot=>{
    let found=false;
    snapshot.forEach(child=>{
      const d=child.val();
      if(d.b===nam&&d.c===amu){
        found=true;
        remove(ref(db,'user/'+child.key)).then(()=>{
          document.getElementById('nam').value='';
          document.getElementById('amu').value='';
          msg.style.color='var(--green)';msg.textContent='✓ Removed';
          setTimeout(()=>{msg.textContent='';closeModal('deleteModal');},1400);
        });
      }
    });
    if(!found){msg.textContent='Item not found';}
  },{onlyOnce:true});
};

/* ── FILTER/SEARCH ── */
window.setFilter=function(f,btn){
  currentFilter=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  render();
};
window.filterCards=function(){
  currentSearch=document.getElementById('searchInp').value;
  render();
};

/* ── NAV ── */
window.openNav=function(){
  const nav=document.getElementById('sidebar');
  const btn=document.getElementById('menuBtn');
  const open=nav.classList.toggle('open');
  btn.classList.toggle('open');
  const m=document.getElementById('map');
  m.style.left=open&&window.innerWidth>768?'var(--sidebar-w)':'0';
};
window.showUpload=function(){document.getElementById('uploadModal').classList.add('open');};
window.showDelete=function(){document.getElementById('deleteModal').classList.add('open');};
window.closeModal=function(id){document.getElementById(id).classList.remove('open');};

document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});

/* ── PAYMENT ── */
window.g=function(){
  qrGenerated=false;qrVisible=false;
  document.getElementById('payQrCanvas').innerHTML='';
  document.getElementById('qrWrapper').classList.remove('visible');
  document.getElementById('qrToggleBtn').innerHTML=`
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Show QR Code`;
  document.getElementById('paymentModal').classList.add('open');
};
window.closePayment=function(){document.getElementById('paymentModal').classList.remove('open');};
window.toggleQR=function(){
  const wrap=document.getElementById('qrWrapper'),btn=document.getElementById('qrToggleBtn');
  if(!qrGenerated){
    new QRCode(document.getElementById('payQrCanvas'),{
      text:'upi://pay?pa=chintukr32101-1@okhdfcbank&pn=Chintu&cu=INR',
      width:200,height:200,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H
    });
    qrGenerated=true;
  }
  qrVisible=!qrVisible;
  wrap.classList.toggle('visible',qrVisible);
  btn.innerHTML=qrVisible
    ?`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Hide QR`
    :`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> Show QR Code`;
};
